name: Generate changelog
on:
  release:
    types: ["published"]
jobs:
  changelog:
    name: Generate changelog
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
      - name: Generate changelog
        uses: ./.github/actions/sphere-changelog
        with:
          filename: pricing-intelligence.json
          sphere_repository: pgmarc/SPHERE
          sphere_token: ${{ secrets.SPHERE_PAT_TOKEN }}
